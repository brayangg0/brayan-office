[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "freetype",
  "harfbuzz",
  "cacert",
  "liberation_ttf",
  "glib",
  "dbus",
  "at-spi2-atk",
  "cups",
  "libdrm",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "libxcb",
  "expat",
  "fontconfig",
  "mesa"
]

[phases.install]
cmds = [
  "cd frontend && npm install",
  "cd backend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "cd backend && npx prisma generate && npm run build"
]

[start]
cmd = "cd backend && npx prisma db push && node dist/index.js"
